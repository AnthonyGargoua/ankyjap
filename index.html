<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYANTO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-white text-black font-sans" x-data="shop">

    <nav class="sticky top-0 z-[100] bg-white border-b-4 border-black px-4 h-20 flex justify-between items-center">
        <div @click="page = 'home'" class="cursor-pointer font-black text-2xl uppercase">KY<span class="text-red-600">ANTO</span></div>
        <div class="flex gap-4 font-black uppercase text-xs">
            <button @click="page = 'home'">Accueil</button>
            <button @click="page = 'shop'">Shop</button>
            <button @click="page = 'drop'">Drop</button>
        </div>
        <button @click="toggleCart(true)" class="relative p-2 border-2 border-black">
            🛒 <span class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full" x-text="cart.length"></span>
        </button>
    </nav>

    <div x-show="page === 'home'" class="py-20 text-center">
        <h1 class="text-8xl font-black italic uppercase">KYANTO</h1>
        <button @click="page = 'shop'" class="mt-10 bg-red-600 text-white px-8 py-4 font-black uppercase italic">Voir le shop</button>
    </div>

    <div x-show="page === 'shop'" :class="universes[filter].bg + ' ' + universes[filter].text" class="min-h-screen p-8" x-cloak>
        <h2 class="text-5xl font-black uppercase mb-8" x-text="universes[filter].title"></h2>
        <div class="flex gap-2 mb-10">
            <template x-for="(u, id) in universes">
                <button @click="filter = id" class="border-2 border-current px-4 py-1 uppercase font-black text-xs" x-text="id"></button>
            </template>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <template x-for="product in products">
                <div x-show="filter === 'all' || product.category === filter" class="border-4 border-current p-4">
                    <img :src="product.images[product.selectedColor]" class="w-full aspect-square object-cover mb-4">
                    <h3 class="text-xl font-black uppercase" x-text="product.name"></h3>
                    <p class="font-black mb-4" x-text="product.price + '€'"></p>
                    <button @click="addToCart(product)" class="w-full bg-black text-white py-2 font-black uppercase">Ajouter +</button>
                </div>
            </template>
        </div>
    </div>

    <div x-show="page === 'drop'" class="min-h-screen bg-black text-white flex flex-col items-center justify-center p-6" x-cloak>
        <form @submit.prevent="submitDropForm" class="bg-white p-8 text-black border-t-8 border-red-600 max-w-sm w-full">
            <input type="text" x-model="formData.prenom" placeholder="Prénom" class="w-full border-2 border-black p-2 mb-4 uppercase font-black" required>
            <button type="submit" class="w-full bg-black text-white py-3 font-black uppercase">S'inscrire</button>
        </form>
    </div>

    <div x-show="page === 'checkout'" class="min-h-screen bg-gray-100 p-8" x-cloak>
        <div class="max-w-2xl mx-auto bg-white border-4 border-black p-8" x-show="orderStep < 3">
            <h2 class="text-3xl font-black uppercase mb-6">Paiement</h2>
            <input type="text" x-model="formData.prenom" placeholder="Prénom" class="w-full border-2 border-black p-2 mb-4">
            <button @click="processOrder()" class="w-full bg-red-600 text-white py-4 font-black uppercase">
                <span x-text="orderStep === 2 ? 'Paiement...' : 'Payer ' + (totalPrice() + shipping) + '€'"></span>
            </button>
        </div>
        <div x-show="orderStep === 3" class="text-center py-20">
            <h2 class="text-5xl font-black uppercase">Merci <span x-text="formData.prenom"></span> !</h2>
            <button @click="page = 'home'; orderStep = 1" class="mt-6 underline font-black uppercase">Retour Accueil</button>
        </div>
    </div>

    <div x-show="cartOpen" class="fixed inset-0 z-[150]" x-cloak>
        <div class="absolute inset-0 bg-black/50" @click="toggleCart(false)"></div>
        <div class="absolute inset-y-0 right-0 w-80 bg-white border-l-4 border-black p-6 flex flex-col">
            <h2 class="text-xl font-black uppercase mb-4">Panier</h2>
            <div class="flex-1 overflow-y-auto">
                <template x-for="(item, index) in cart">
                    <div class="flex justify-between mb-4 border-b pb-2">
                        <span class="text-xs font-black uppercase" x-text="item.name"></span>
                        <span class="font-bold" x-text="item.price + '€'"></span>
                    </div>
                </template>
            </div>
            <button @click="goToCheckout()" class="w-full bg-black text-white py-3 font-black uppercase">Checkout</button>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
