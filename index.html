<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANKYJAP | Tokyo Temple</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white text-black font-sans" x-data="shop" x-cloak>

    <nav class="sticky top-0 z-50 bg-white border-b-4 border-black">
        <div class="max-w-7xl mx-auto px-4 flex justify-between h-24 items-center">
            <div @click="page = 'home'" class="cursor-pointer">
                <span class="text-4xl font-black italic tracking-tighter">ANKY<span class="text-red-600">JAP</span></span>
            </div>
            
            <div class="hidden md:flex space-x-10 font-black text-lg tracking-widest uppercase">
                <button @click="page = 'home'" :class="page === 'home' ? 'text-red-600' : ''" class="hover:text-red-600 transition">Accueil</button>
                <button @click="page = 'shop'" :class="page === 'shop' ? 'text-red-600' : ''" class="hover:text-red-600 transition">Shop</button>
                <button @click="page = 'drop'" :class="page === 'drop' ? 'text-red-600' : ''" class="flex items-center hover:text-red-600 transition">
                    <span class="w-3 h-3 bg-red-600 rounded-full mr-2 animate-ping"></span> DROP
                </button>
            </div>

            <button @click="cartOpen = true" class="relative p-2">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                <span class="absolute top-0 right-0 bg-red-600 text-white text-xs w-6 h-6 flex items-center justify-center rounded-full font-black shadow-lg" x-text="cart.length"></span>
            </button>
        </div>
    </nav>

    <main>
        <div x-show="page === 'home'" class="hero-section">
            <div class="text-center text-white px-4 z-10">
                <h1 class="text-7xl md:text-[13rem] font-black italic leading-none animate__animated animate__fadeInDown">ANKYJAP</h1>
                <p class="text-lg md:text-3xl tracking-[0.8em] mt-4 uppercase font-bold">Sacred Streetwear</p>
                <button @click="page = 'shop'" class="mt-12 bg-red-600 text-white px-16 py-6 font-black hover:bg-white hover:text-black transition uppercase text-sm tracking-widest border-2 border-red-600">Enter the Shrine</button>
            </div>
        </div>

        <div x-show="page === 'shop'" class="max-w-7xl mx-auto py-20 px-4 animate__animated animate__fadeIn">
            <h2 class="text-6xl md:text-9xl font-black italic uppercase mb-12 border-b-8 border-black">Store</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <template x-for="product in products" :key="product.id">
                    <div class="border-2 border-black flex flex-col group">
                        <div class="relative overflow-hidden aspect-[3/4] bg-gray-100">
                            <img :src="product.image" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                            <button @click="addToCart(product)" class="absolute bottom-0 w-full bg-black text-white py-5 font-black text-xs uppercase translate-y-full group-hover:translate-y-0 transition">Add to Cart</button>
                        </div>
                        <div class="p-4 bg-white border-t-2 border-black">
                            <p class="font-black uppercase text-xs md:text-sm" x-text="product.name"></p>
                            <p class="text-red-600 font-bold text-lg" x-text="product.price + '€'"></p>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="page === 'drop'" class="min-h-screen bg-black text-white animate__animated animate__fadeIn">
            <div class="bg-red-600 py-4 overflow-hidden border-y-2 border-white">
                <div class="marquee-content whitespace-nowrap flex font-black uppercase italic text-xl md:text-3xl tracking-tighter">
                    <span class="mx-8">TEMPLE DROP // NO RESTOCK // SACRED SERIES //</span>
                    <span class="mx-8">TEMPLE DROP // NO RESTOCK // SACRED SERIES //</span>
                </div>
            </div>

            <div class="flex flex-col items-center justify-center pt-24 px-4">
                <h2 class="text-[20vw] font-black italic leading-none text-white opacity-10">DROP</h2>
                
                <div class="flex space-x-6 md:space-x-16 text-center -mt-16 md:-mt-32 mb-20">
                    <div><span class="text-6xl md:text-[10rem] font-black block" x-text="countdown.d"></span><p class="text-sm text-red-600 font-bold">JOURS</p></div>
                    <div class="text-6xl md:text-[10rem] font-black">:</div>
                    <div><span class="text-6xl md:text-[10rem] font-black block" x-text="countdown.h"></span><p class="text-sm text-red-600 font-bold">HEURES</p></div>
                    <div class="text-6xl md:text-[10rem] font-black">:</div>
                    <div><span class="text-6xl md:text-[10rem] font-black block" x-text="countdown.m"></span><p class="text-sm text-red-600 font-bold">MINS</p></div>
                </div>

                <div class="max-w-2xl w-full px-6 text-center">
                    <template x-if="!mailSubmitted">
                        <div>
                            <p class="text-sm tracking-[0.5em] text-gray-400 mb-10 uppercase italic">Inscris-toi pour recevoir le sceau d'accès</p>
                            <div class="flex flex-col md:flex-row border-4 border-white">
                                <input x-model="email" type="email" placeholder="TON EMAIL" class="flex-1 bg-transparent p-6 text-white outline-none font-bold text-lg uppercase">
                                <button @click="submitMail()" class="bg-white text-black px-12 py-6 font-black hover:bg-red-600 hover:text-white transition uppercase text-lg">Rejoindre</button>
                            </div>
                        </div>
                    </template>
                    
                    <template x-if="mailSubmitted">
                        <div class="animate__animated animate__zoomIn bg-red-600 p-10 border-4 border-white shadow-[0_0_50px_rgba(188,0,45,0.5)]">
                            <h3 class="text-3xl font-black italic uppercase mb-2">INSCRIPTION VALIDÉE ⛩️</h3>
                            <p class="text-white font-bold tracking-widest uppercase text-sm">Surveille tes mails, l'assaut commence bientôt.</p>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
