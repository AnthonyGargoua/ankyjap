<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYANTO | Boutique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        [x-cloak] { display: none !important; }
        .skew-btn { transform: skewX(-15deg); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .skew-content { transform: skewX(15deg); display: inline-block; }
        .shadow-hyper { shadow-offset: 10px 10px; shadow-color: #000; }
    </style>
</head>
<body class="bg-white text-black font-sans" x-data="shop">

    <nav class="sticky top-0 z-[100] bg-white border-b-4 border-black px-6 h-20 flex justify-between items-center">
        <div @click="page = 'home'" class="cursor-pointer font-black text-4xl italic tracking-tighter uppercase">
            KY<span class="text-red-600">ANTO</span>
        </div>
        <div class="hidden md:flex space-x-8 font-black uppercase text-xs tracking-widest">
            <button @click="page = 'home'" :class="page === 'home' ? 'text-red-600' : ''">Accueil</button>
            <button @click="page = 'shop'" :class="page === 'shop' ? 'text-red-600' : ''">Boutique</button>
        </div>
        <button @click="toggleCart(true)" class="relative p-3 border-4 border-black hover:bg-black hover:text-white transition shadow-[4px_4px_0px_#000]">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
            <span class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] w-6 h-6 flex items-center justify-center rounded-full font-black border-2 border-black" x-text="cart.length"></span>
        </button>
    </nav>

    <div x-show="page === 'home'" x-transition>
        <section class="bg-black text-white min-h-[90vh] flex flex-col justify-center items-center text-center px-6 relative overflow-hidden">
            <div class="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
            <h1 class="text-8xl md:text-[13rem] font-black italic uppercase leading-none z-10 animate__animated animate__zoomIn">KYANTO</h1>
            <p class="text-2xl md:text-3xl font-black italic uppercase tracking-[0.4em] mt-4 z-10 text-red-600">Pure Streetwear Clan</p>
            <button @click="page = 'shop'" class="mt-16 bg-red-600 text-white px-12 py-6 text-3xl font-black uppercase italic skew-btn z-10 shadow-[10px_10px_0px_#fff] hover:bg-white hover:text-red-600 hover:shadow-[10px_10px_0px_#ff0000]">
                <span class="skew-content">Entrer dans le shop</span>
            </button>
        </section>
    </div>

    <div x-show="page === 'shop'" :class="universes[filter].bg + ' ' + universes[filter].text" class="min-h-screen py-16 px-6 transition-all duration-1000" x-cloak>
        <div class="max-w-7xl mx-auto">
            <h2 class="text-7xl md:text-9xl font-black italic uppercase mb-12 animate__animated animate__fadeInLeft" x-text="universes[filter].title"></h2>
            
            <div class="flex gap-4 mb-20 overflow-x-auto pb-4">
                <template x-for="(u, id) in universes">
                    <button @click="filter = id" 
                            :class="filter === id ? 'bg-red-600 text-white border-red-600' : 'border-4 border-current'"
                            class="px-10 py-4 font-black uppercase italic text-xl skew-btn transition-all">
                        <span class="skew-content" x-text="id"></span>
                    </button>
                </template>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
                <template x-for="product in products" :key="product.id">
                    <div x-show="filter === 'all' || product.category === filter" 
                         class="group border-8 border-current p-6 transition-all hover:shadow-[20px_20px_0px_#ff0000] bg-opacity-10 bg-white">
                        <img :src="product.images[product.selectedColor]" class="w-full aspect-square object-cover border-4 border-current mb-8 grayscale group-hover:grayscale-0 transition-all duration-500">
                        <h3 class="text-4xl font-black uppercase italic mb-2" x-text="product.name"></h3>
                        <p class="text-3xl font-black mb-8" x-text="product.price + '€'"></p>
                        
                        <div class="flex gap-4 mb-8 font-black uppercase">
                            <template x-for="color in product.colors">
                                <button @click="product.selectedColor = color.name" 
                                        :class="product.selectedColor === color.name ? 'scale-125 border-red-600' : 'border-current'"
                                        :style="'background-color:' + color.hex" class="w-10 h-10 border-4 transition-all"></button>
                            </template>
                        </div>

                        <button @click="addToCart(product)" class="w-full bg-current text-white py-5 font-black uppercase italic text-2xl skew-btn mix-blend-difference hover:bg-red-600">
                            <span class="skew-content">Ajouter au Clan +</span>
                        </button>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <div x-show="page === 'checkout'" class="min-h-screen bg-zinc-100 py-20 px-6" x-cloak>
        <div class="max-w-6xl mx-auto" x-show="orderStep < 3">
            <h2 class="text-6xl font-black uppercase italic mb-16">Logistique <span class="text-red-600">Kyanto</span></h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
                <div class="bg-white border-[10px] border-black p-10 shadow-[20px_20px_0px_#000]">
                    <div class="space-y-6">
                        <input type="text" x-model="formData.prenom" placeholder="Prénom" class="w-full border-4 border-black p-5 font-black uppercase text-2xl outline-none focus:bg-red-50">
                        <input type="text" x-model="formData.adresse" placeholder="Adresse" class="w-full border-4 border-black p-5 font-black uppercase text-2xl outline-none focus:bg-red-50">
                        <button @click="processOrder()" class="w-full bg-red-600 text-white py-6 font-black uppercase italic text-3xl skew-btn shadow-[8px_8px_0px_#000]">
                            <span class="skew-content" x-text="orderStep === 2 ? 'TRAITEMENT...' : 'PAYER MAINTENANT'"></span>
                        </button>
                    </div>
                </div>
                <div class="bg-black text-white p-10 border-t-[15px] border-red-600 h-fit">
                    <h3 class="text-3xl font-black uppercase italic mb-8 border-b-2 border-white/20 pb-4">Récapitulatif</h3>
                    <template x-for="item in cart">
                        <div class="flex justify-between items-center mb-4 font-black uppercase italic">
                            <span class="text-lg" x-text="item.name"></span>
                            <span class="text-xl text-red-600" x-text="item.price + '€'"></span>
                        </div>
                    </template>
                    <div class="mt-12 text-5xl font-black italic uppercase flex justify-between">
                        <span>Total</span>
                        <span x-text="(totalPrice() + shipping).toFixed(2) + '€'"></span>
                    </div>
                </div>
            </div>
        </div>
        <div x-show="orderStep === 3" class="text-center py-20 animate__animated animate__jackInTheBox">
            <h2 class="text-9xl font-black italic uppercase text-red-600 mb-6">MERCI.</h2>
            <p class="text-3xl font-black uppercase tracking-[0.5em]">Commande #KYA-OK validée</p>
            <button @click="page = 'home'; orderStep = 1" class="mt-16 bg-black text-white px-12 py-5 font-black uppercase italic text-xl skew-btn shadow-[8px_8px_0px_#ff0000]">
                <span class="skew-content">Retour à l'accueil</span>
            </button>
        </div>
    </div>

    <div x-show="cartOpen" class="fixed inset-0 z-[150]" x-cloak>
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" @click="toggleCart(false)"></div>
        <div class="absolute inset-y-0 right-0 w-full max-w-md bg-white border-l-[12px] border-black flex flex-col">
            <div class="p-8 bg-black text-white flex justify-between items-center border-b-[12px] border-red-600">
                <h2 class="text-4xl font-black uppercase italic">Ton Pack</h2>
                <button @click="toggleCart(false)" class="text-5xl font-black hover:text-red-600">&times;</button>
            </div>
            <div class="flex-1 overflow-y-auto p-8 space-y-6">
                <template x-for="(item, index) in cart">
                    <div class="flex gap-6 border-b-4 border-gray-100 pb-6 items-center">
                        <img :src="item.finalImage" class="w-28 h-28 object-cover border-4 border-black shadow-[5px_5px_0px_#ff0000]">
                        <div class="flex-1">
                            <p class="font-black uppercase text-lg italic" x-text="item.name"></p>
                            <button @click="removeFromCart(index)" class="text-xs font-black text-red-600 uppercase underline">Supprimer</button>
                        </div>
                        <span class="font-black text-2xl" x-text="item.price + '€'"></span>
                    </div>
                </template>
            </div>
            <div class="p-8 bg-gray-50 border-t-[12px] border-black">
                <div class="flex justify-between text-4xl font-black uppercase italic mb-8">
                    <span>Total</span>
                    <span x-text="totalPrice() + '€'"></span>
                </div>
                <button @click="goToCheckout()" class="w-full bg-red-600 text-white py-6 font-black uppercase italic text-2xl skew-btn shadow-[10px_10px_0px_#000]">
                    <span class="skew-content">VALIDER LE PACK</span>
                </button>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
